<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claim Your Gift</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="gift-section">
        <div class="gift-card premium-gift-card">
          <div class="gift-top">
            <p class="eyebrow">Special Gift</p>
            <h1>Spin the Wheel</h1>
            <p class="gift-subtitle">Take a spin and reveal the birthday surprise waiting for you.</p>
          </div>
          <div class="wheel-wrap">
            <div class="wheel-shell">
              <div class="wheel-glow"></div>
              <div class="wheel-pointer">▲</div>
              <div class="wheel">
                <div class="wheel-center"></div>
                <div class="wheel-label">Spin<br />Me</div>
              </div>
            </div>
          </div>
          <button id="spinBtn" class="gift-btn">Spin Now</button>
          <p id="resultText" class="result"></p>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
